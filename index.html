<style>
:root {
  --bg:#0a0f1e; --surface:#111827; --surface2:#1a2535; --surface3:#1e2d45;
  --border:#1e2d45; --border2:#2a3f5f;
  --green:#00e5a0; --green-d:#00e5a012;
  --yellow:#f0b429; --yellow-d:#f0b42912;
  --red:#ff4d6d; --red-d:#ff4d6d12;
  --blue:#3d9cf0; --blue-d:#3d9cf012;
  --purple:#a78bfa; --purple-d:#a78bfa12;
  --orange:#f97316;
  --text:#e2e8f0; --muted:#64748b; --muted2:#94a3b8;
  --mono:'SF Mono',SFMono-Regular,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}

/* APP SHELL */
.app{display:flex;flex-direction:column;height:100%;max-width:560px;margin:0 auto;}

/* HEADER */
.hdr{padding:max(14px,env(safe-area-inset-top)) 16px 10px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;}
.hdr-logo{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green);display:flex;align-items:center;gap:6px;}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.hdr-cap{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--green);text-align:right;}
.hdr-cap-lbl{font-size:9px;color:var(--muted);text-align:right;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
.pad{padding:14px 16px 30px;}

/* NAV */
.nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:max(8px,env(safe-area-inset-bottom));}
.nb{flex:1;padding:9px 2px 8px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:2px solid transparent;}
.nb.on{border-top-color:var(--green);}
.ni{font-size:17px;line-height:1;}
.nl{font-size:9px;color:var(--muted);font-weight:400;}
.nb.on .nl{color:var(--green);font-weight:700;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.card-tap{cursor:pointer;}
.card-tap:active{opacity:.65;}

/* SEC TITLE */
.sec{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 10px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* BADGE */
.bdg{display:inline-block;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;letter-spacing:.4px;white-space:nowrap;}
.bg{background:var(--green-d);color:var(--green);}
.br{background:var(--red-d);color:var(--red);}
.by{background:var(--yellow-d);color:var(--yellow);}
.bb{background:var(--blue-d);color:var(--blue);}
.bp{background:var(--purple-d);color:var(--purple);}

/* BARS */
.bar-bg{height:4px;background:var(--border);border-radius:4px;overflow:hidden;margin:5px 0 2px;}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.mt{background:var(--surface2);border-radius:10px;padding:10px;}
.ml{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.mv{font-family:var(--mono);font-size:12px;font-weight:700;}

/* HERO */
.hero{background:linear-gradient(135deg,#0a1e36,#0d1420);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;text-align:center;}
.hero-cap{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--green);letter-spacing:-1px;}
.hero-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.hero-stats{display:flex;justify-content:center;gap:18px;margin-top:12px;}
.hs{text-align:center;}
.hs .v{font-family:var(--mono);font-size:17px;font-weight:700;}
.hs .l{font-size:9px;color:var(--muted);margin-top:1px;}
.hsdiv{width:1px;background:var(--border);}

/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:480px;}
th{background:var(--surface2);color:var(--muted);font-weight:600;padding:9px 10px;text-align:left;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.inp{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);padding:5px 7px;width:100%;font-size:11px;font-family:var(--mono);outline:none;min-width:60px;}
.inp:focus{border-color:var(--green);}
.inp-sm{min-width:50px;width:65px;}
.inp-md{min-width:70px;width:85px;}
.inp-lg{min-width:90px;width:110px;}

/* BTN ADD */
.btn-add{width:100%;background:var(--green-d);border:1px dashed var(--green);color:var(--green);border-radius:10px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-add:active{opacity:.7;}
.btn-del{background:transparent;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:3px 5px;}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:#000c;z-index:200;align-items:flex-end;}
.modal.open{display:flex;}
.modal-inner{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-height:85vh;overflow-y:auto;padding-bottom:max(20px,env(safe-area-inset-bottom));}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:var(--surface2);border:none;color:var(--muted);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;}
.lbl{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;}
.inp-full{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--text);font-size:13px;outline:none;margin-bottom:14px;-webkit-appearance:none;}
.inp-full:focus{border-color:var(--green);}
select.inp-full{cursor:pointer;}
.btn-save{width:100%;background:var(--green);border:none;color:#080c14;border-radius:10px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;}
.btn-cancel{width:100%;background:transparent;border:none;color:var(--muted);padding:10px;font-size:13px;cursor:pointer;margin-top:6px;}

/* TOAST */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);color:var(--text);padding:10px 18px;border-radius:20px;font-size:12px;opacity:0;transition:all .3s;z-index:300;white-space:nowrap;border:1px solid var(--border2);pointer-events:none;}

/* LIVE */
.live-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.live-bdg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--green);background:var(--green-d);padding:4px 10px;border-radius:20px;}
.spin{animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.upd-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:8px;font-size:10px;cursor:pointer;}

/* ALERT */
.alrt{border-radius:10px;padding:11px 13px;margin-bottom:8px;font-size:12px;font-weight:500;line-height:1.5;}

/* SOFIPO CARD */
.sofi-card{background:var(--surface2);border-radius:12px;padding:13px;margin-bottom:8px;border:1px solid var(--border);}

/* RADAR CARD */
.radar-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.radar-card.zona{border-color:var(--green);}

/* AGENDA */
.ag-item{border-radius:12px;padding:12px 13px;margin-bottom:8px;border-left-width:3px;border-left-style:solid;}
</style>
</head>

  catch(e){ return JSON.parse(JSON.stringify(DEF)); }
}
function guardar(){ try{ localStorage.setItem('ruta_saul_v4',JSON.stringify(D)); }catch(e){} }
let D = cargar();

// ── Helpers ──
const fmt = n => '$'+Math.abs(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK = n => {
  const a=Math.abs(n);
  if(a>=1000) return (n<0?'-':'')+'$'+(a/1000).toLocaleString('es-MX',{minimumFractionDigits:1,maximumFractionDigits:1})+'K';
  return fmt(n);
};
const pct = n => (n>=0?'+':'')+n.toFixed(2)+'%';
const gc = n => n>=0?'var(--green)':'var(--red)';
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

const sCfg = {
  comprar: {l:'COMPRAR',  cls:'bg'},
  acumular:{l:'ACUMULAR', cls:'bg'},
  estrella:{l:'⭐ ESTRELLA',cls:'by'},
  mantener:{l:'MANTENER', cls:'bb'},
  vigilar: {l:'VIGILAR',  cls:'by'},
  vender:  {l:'VENDER ⚠',cls:'br'},
};
const gLabels = {Global:'🌎 Global', México:'🇲🇽 México', FIBRA:'🏢 FIBRA'};

// ── Total GBM ──
function totalGBM(){ return D.gbm.reduce((s,a)=>s+(a.tits*a.pm),0); }
function totalPilares(){
  const gbmVal = totalGBM();
  return D.pilares.reduce((s,p)=> p.id==='gbm' ? s+gbmVal : s+p.saldo, 0);
}

let tab = 'general';
let actualizando = false;

function goTab(t){
  tab=t;
  document.querySelectorAll('.nb').forEach((b,i)=>{
    b.classList.toggle('on',['general','gbm','divs','radar','agenda'][i]===t);
  });
  renderTab();
  document.getElementById('main-pad').parentElement.scrollTop=0;
}

function renderTab(){
  // Header
  const total = totalPilares();
  document.getElementById('hdr-total').textContent = fmtK(total);
  const now = new Date();
  document.getElementById('hdr-fecha').textContent =
    now.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'})+' · '+
    now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});

  const map = {general:tplGeneral, gbm:tplGBM, divs:tplDivs, radar:tplRadar, agenda:tplAgenda};
  document.getElementById('main-pad').innerHTML = map[tab]();
  if(tab==='gbm') document.getElementById('upd-btn')?.addEventListener('click',actualizarPrecios);
}

// ══════════════════════════════════════════
// PRECIOS EN TIEMPO REAL — Yahoo Finance
// ══════════════════════════════════════════
async function actualizarPrecios(){
  if(actualizando) return;
  actualizando=true;
  const ic=document.getElementById('live-ic');
  const btn=document.getElementById('upd-btn');
  if(ic) ic.className='spin';
  if(btn) btn.textContent='Actualizando...';

  const syms = D.gbm.map(a=>a.yt).filter(Boolean).join(',');
  const yUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${syms}&fields=regularMarketPrice`;
  const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(yUrl)}`;

  try{
    const r = await fetch(proxy,{signal:AbortSignal.timeout(10000)});
    const j = await r.json();
    const quotes = j?.quoteResponse?.result || [];
    let updated=0;
    quotes.forEach(q=>{
      const a = D.gbm.find(x=>x.yt===q.symbol);
      if(a && q.regularMarketPrice){
        a.pm = parseFloat(q.regularMarketPrice.toFixed(2));
        updated++;
      }
    });
    guardar();
    renderTab();
    toast(updated>0?`✓ ${updated} precios actualizados`:'Sin precios nuevos — intenta de nuevo');
  }catch(e){
    toast('Sin conexión — ingresa precios manualmente');
  }
  actualizando=false;
}

// TAB GBM

function tplGBM(){
  const grupos = ['Global','México','FIBRA'];
  let tComp=0, tMkt=0;
  D.gbm.forEach(a=>{ tComp+=a.tits*a.pp; tMkt+=a.tits*a.pm; });
  const tPlus = tMkt-tComp;
  const tPlusPct = tComp>0?(tPlus/tComp*100):0;

  const gruposH = grupos.map(g=>{
    const stocks = D.gbm.filter(a=>a.g===g);
    const rows = stocks.map(a=>{
      const idx = D.gbm.indexOf(a);
      const tm = a.tits*a.pm;
      const tc = a.tits*a.pp;
      const plus = tm-tc;
      const plusPct = tc>0?(plus/tc*100):0;
      const cfg = sCfg[a.st]||sCfg.mantener;
      return `<tr>
        <td><div style="font-family:var(--mono);font-weight:700;font-size:11px">${a.t}</div><div style="font-size:9px;color:var(--muted)">${a.n}</div></td>
        <td><input class="inp inp-sm" type="number" value="${a.tits}" onchange="updGBM(${idx},'tits',this.value)"></td>
        <td><input class="inp inp-md" type="number" step="0.01" value="${a.pp.toFixed(2)}" onchange="updGBM(${idx},'pp',this.value)"></td>
        <td><input class="inp inp-md" type="number" step="0.01" value="${a.pm.toFixed(2)}" onchange="updGBM(${idx},'pm',this.value)"></td>
        <td style="font-family:var(--mono);color:var(--blue)">${fmtK(tm)}</td>
        <td style="font-family:var(--mono);color:${gc(plus)}">${pct(plusPct)}</td>
        <td><span class="bdg ${cfg.cls}">${cfg.l}</span></td>
        <td><button class="btn-del" onclick="delGBM(${idx})"><i class="fa fa-trash"></i></button></td>
      </tr>`;
    }).join('');
    return `
    <div class="sec">${gLabels[g]}</div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="tbl-wrap"><table>
        <thead><tr><th>Ticker</th><th>Títs</th><th>P.Prom</th><th>P.Mkt</th><th>Total</th><th>+/−</th><th>Estado</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }).join('');

  return `
  <div class="live-row">
    <div class="live-bdg"><i id="live-ic" class="fa-solid fa-circle-dot"></i> Precios en vivo</div>
    <button id="upd-btn" class="upd-btn">⟳ Actualizar</button>
  </div>
  <div class="card">
    <div class="g3">
      <div class="mt"><div class="ml">Invertido</div><div class="mv">${fmtK(tComp)}</div></div>
      <div class="mt"><div class="ml">Mercado</div><div class="mv" style="color:var(--blue)">${fmtK(tMkt)}</div></div>
      <div class="mt"><div class="ml">Plusvalía</div><div class="mv" style="color:${gc(tPlus)}">${pct(tPlusPct)}</div></div>
    </div>
  </div>
  ${gruposH}
  <button class="btn-add" onclick="addGBM()">+ Agregar acción o FIBRA</button>`;
}

function tplDivs(){
  // Solo fuentes reales que pagan dividendos / distribuciones
  const avisosH = D.avisos.map((a,i)=>{
    const total = (a.monto*a.tits).toFixed(2);
    return `<tr>
      <td style="font-family:var(--mono);font-weight:700">${a.activo}</td>
      <td><input class="inp inp-lg" type="date" value="${a.exDiv}" onchange="updAviso(${i},'exDiv',this.value)"></td>
      <td><input class="inp inp-lg" type="date" value="${a.pago}"  onchange="updAviso(${i},'pago',this.value)"></td>
      <td><input class="inp inp-md" type="number" step="0.001" value="${a.monto}" onchange="updAviso(${i},'monto',this.value)"></td>
      <td><input class="inp inp-sm" type="number" value="${a.tits}" onchange="updAviso(${i},'tits',this.value)"></td>
      <td style="font-family:var(--mono);color:var(--green);font-weight:700">${fmt(a.monto*a.tits)}</td>
      <td><button class="btn-del" onclick="delAviso(${i})"><i class="fa fa-trash"></i></button></td>
    </tr>`;
  }).join('');

  // Agrupar cobros por año
  const porAno = {};
  D.cobros.forEach((c,i)=>{
    const ano = c.mes.includes('25')?'2025':c.mes.includes('26')?'2026':'Otro';
    if(!porAno[ano]) porAno[ano]=[];
    porAno[ano].push({...c, idx:i});
  });

  // Totales por mes dentro de cada año (para mostrar resumen)
  function resumenMensual(items){
    const porMes = {};
    items.forEach(c=>{
      const m = c.mes;
      if(!porMes[m]) porMes[m]=0;
      porMes[m]+=(c.bruto-c.isr);
    });
    return porMes;
  }

  const anosOrdenados = Object.keys(porAno).sort();
  let totalGeneral = 0;

  const anosH = anosOrdenados.map(ano=>{
    const items = porAno[ano];
    const totalAno = items.reduce((s,c)=>s+(c.bruto-c.isr),0);
    totalGeneral += totalAno;
    const resumen = resumenMensual(items);

    const resumenH = Object.entries(resumen).map(([mes,tot])=>
      `<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:11px;border-bottom:1px solid var(--border)">
        <span style="color:var(--muted2)">${mes}</span>
        <span style="font-family:var(--mono);color:var(--green);font-weight:600">${fmt(tot)}</span>
      </div>`).join('');

    const detalleH = items.map(c=>{
      const neto = c.bruto-c.isr;
      return `<tr>
        <td><input class="inp inp-sm" type="text" value="${c.mes}" onchange="updCobro(${c.idx},'mes',this.value)"></td>
        <td style="font-family:var(--mono);font-weight:700"><input class="inp inp-md" type="text" value="${c.activo}" onchange="updCobro(${c.idx},'activo',this.value)"></td>
        <td><input class="inp inp-md" type="number" step="0.001" value="${c.bruto}" onchange="updCobro(${c.idx},'bruto',this.value)"></td>
        <td><input class="inp inp-md" type="number" step="0.001" value="${c.isr}" onchange="updCobro(${c.idx},'isr',this.value)"></td>
        <td style="font-family:var(--mono);color:${gc(neto)};font-weight:700">${fmt(neto)}</td>
        <td><button class="btn-del" onclick="delCobro(${c.idx})"><i class="fa fa-trash"></i></button></td>
      </tr>`;
    }).join('');

    return `
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:10px">
      <div class="card-tap" onclick="toggleAno('${ano}')" style="padding:13px;display:flex;justify-content:space-between;align-items:center;background:var(--surface2)">
        <div style="display:flex;align-items:center;gap:8px">
          <span id="ano-arrow-${ano}" style="font-size:11px;color:var(--muted);transition:transform .2s">▶</span>
          <span style="font-weight:700;font-size:14px">${ano}</span>
          <span style="font-size:10px;color:var(--muted)">(${items.length} pagos)</span>
        </div>
        <div style="font-family:var(--mono);font-size:15px;font-weight:700;color:var(--green)">${fmt(totalAno)}</div>
      </div>
      <div id="ano-content-${ano}" style="display:none">
        <div style="padding:10px 13px;border-top:1px solid var(--border)">
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Resumen mensual (neto)</div>
          ${resumenH}
        </div>
        <div class="tbl-wrap" style="border:none;border-top:1px solid var(--border);border-radius:0">
          <table>
            <thead><tr><th>Mes</th><th>Activo</th><th>Bruto</th><th>ISR</th><th>Neto</th><th></th></tr></thead>
            <tbody>${detalleH}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }).join('');

  // Intereses SOFIPOs
  const sofiIntH = D.sofipos.map(s=>{
    const iMes = s.saldo*s.tasa/100/12;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
      <div><div style="font-size:12px;font-weight:600">${s.n}</div><div style="font-size:10px;color:var(--muted)">${s.tasa}% anual sobre ${fmt(s.saldo)}</div></div>
      <div style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green)">${fmt(iMes)}/mes</div>
    </div>`;
  }).join('');
  const totalIntSofi = D.sofipos.reduce((s,x)=>s+(x.saldo*x.tasa/100/12),0);

  return `
  <div class="hero" style="padding:16px">
    <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">Total Dividendos Cobrados (Neto)</div>
    <div class="hero-cap" style="font-size:24px">${fmt(totalGeneral)}</div>
    <div class="hero-sub">FIBRAs + Acciones MX · 2025-2026</div>
  </div>

  <div class="sec">📅 Próximos Pagos / Distribuciones</div>
  <div class="card" style="padding:0;overflow:hidden">
    <div class="tbl-wrap"><table>
      <thead><tr><th>Activo</th><th>Ex-Div</th><th>Pago</th><th>$/Tít</th><th>Tíuts</th><th>Total Est.</th><th></th></tr></thead>
      <tbody>${avisosH}</tbody>
    </table></div>
  </div>
  <button class="btn-add" onclick="addAviso()">+ Agregar aviso de pago</button>

  <div class="sec">💵 Historial de Dividendos por Año <span style="font-size:8px">(toca para expandir)</span></div>
  ${anosH}
  <button class="btn-add" onclick="addCobro()">+ Registrar nuevo cobro</button>

  <div class="sec">🏦 Intereses SOFIPOs (ingreso pasivo mensual)</div>
  <div class="card">
    ${sofiIntH}
    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:2px">
      <div style="font-size:12px;font-weight:700">Total intereses/mes</div>
      <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--green)">${fmt(totalIntSofi)}</div>
    </div>
  </div>`;
}

function toggleAno(ano){
  const content = document.getElementById('ano-content-'+ano);
  const arrow = document.getElementById('ano-arrow-'+ano);
  const isOpen = content.style.display!=='none';
  content.style.display = isOpen?'none':'block';
  arrow.style.transform = isOpen?'rotate(0deg)':'rotate(90deg)';
}

    const enZona = r.precio<=r.zMax;
    const dist = ((r.precio-r.zMax)/r.precio*100).toFixed(1);
    const fill = Math.min(100,Math.max(5,((r.precio-r.zMin*0.85)/(r.obj-r.zMin*0.85))*100));
    return `<div class="radar-card ${enZona?'zona':''}" onclick="editRadar(${i})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px">
        <div>
          <div style="font-family:var(--mono);font-size:14px;font-weight:700">${r.t}</div>
          <div style="font-size:10px;color:var(--muted)">${r.n}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--yellow)">$${r.precio} ${r.mon}</div>
          <div style="font-size:9px;color:${enZona?'var(--green)':'var(--purple)'};margin-top:2px">${enZona?'✅ EN ZONA — evalúa entrar':dist+'% sobre zona'}</div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-bottom:5px">
        <span>Zona: $${r.zMin}–$${r.zMax}</span><span>Objetivo: $${r.obj} (+${r.pot}%)</span>
      </div>
      <div class="bar-bg" style="height:3px"><div class="bar-fill" style="width:${fill}%;background:${enZona?'var(--green)':'var(--purple)'}"></div></div>
    </div>`;
  }).join('');

  return `
  <div style="background:var(--purple-d);border:1px solid #a78bfa25;border-radius:12px;padding:13px;margin-bottom:14px">
    <div style="font-size:12px;color:var(--purple);font-weight:700;margin-bottom:3px">🎯 Estrategia de entrada</div>
    <div style="font-size:11px;color:var(--muted2);line-height:1.6">No entrar en máximos. Cada acción tiene zona verde de compra ideal. Fuera de esa zona, esperamos. Toca para editar precios.</div>
  </div>
  ${radarH}
  <button class="btn-add" onclick="addRadar()">+ Agregar al radar</button>`;
}

function tplAgenda(){
  const cfg = {
    alta: {c:'var(--red)',    b:'var(--red-d)',    l:'Urgente'},
    media:{c:'var(--yellow)', b:'var(--yellow-d)', l:'Importante'},
    baja: {c:'var(--blue)',   b:'var(--blue-d)',   l:'Seguimiento'},
  };
  const legend = Object.entries(cfg).map(([k,v])=>
    `<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:${v.c};margin-right:10px">
      <span style="width:5px;height:5px;border-radius:50%;background:${v.c};display:inline-block"></span>${v.l}
    </span>`).join('');

  const items = D.agenda.map((e,i)=>{
    const u = cfg[e.u];
    return `<div class="ag-item" style="background:${u.b};border-color:${u.c}30;border-left-color:${u.c}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;margin-bottom:3px">${e.ic} ${e.t}</div>
          <div style="font-size:11px;color:var(--muted2);line-height:1.5">${e.d}</div>
        </div>
        <div style="font-family:var(--mono);font-size:9px;color:${u.c};background:${u.b};padding:3px 7px;border-radius:6px;white-space:nowrap;border:1px solid ${u.c}30">${e.f}</div>
      </div>
    </div>`;
  }).join('');

  return `<div style="margin-bottom:14px">${legend}</div>${items}`;
}

function toast(msg){
  const t=document.getElementById('toast');

  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px)'; },2500);
}
